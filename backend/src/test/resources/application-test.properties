# Base de datos en memoria para tests
spring.datasource.url=jdbc:h2:mem:llavero_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT para tests (clave de 32 bytes en Base64)
jwt.secret=dGVzdC1zZWNyZXQta2V5LXBhcmEtdGVzdHMtbGxhdmVybzI2
jwt.expiration=7200000

# Deshabilitar email en tests
spring.mail.host=
spring.mail.username=

# Clave de anulación para tests
llavero.clave.anulacion=9999

# Deshabilitar Cloudflare / servicios externos
app.registro.habilitado=false
app.pin.aseo=1441

# Sin datos de transferencia en tests
llavero.transferencia.banco=
llavero.transferencia.cuenta=
llavero.transferencia.rut=
llavero.transferencia.titular=
llavero.arqueo.email.destino=
llavero.arqueo.email.remitente=test@llavero.cl
